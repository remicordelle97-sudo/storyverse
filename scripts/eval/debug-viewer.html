<!DOCTYPE html>
<html>
<head><title>Eval Viewer Debug</title></head>
<body>
<h2>Debug Test</h2>
<textarea id="input" rows="10" cols="80" placeholder="Paste JSON here"></textarea>
<br>
<button onclick="tryParse()">Test Parse</button>
<button onclick="tryRender()">Test Render</button>
<div id="output" style="margin-top:1rem;padding:1rem;background:#f5f5f5;white-space:pre-wrap;font-family:monospace;font-size:0.8rem"></div>

<script>
function tryParse() {
  const out = document.getElementById('output');
  const text = document.getElementById('input').value.trim();
  try {
    const data = JSON.parse(text);
    out.textContent = 'Parse OK. Type: ' + typeof data + ', isArray: ' + Array.isArray(data) + ', length: ' + (Array.isArray(data) ? data.length : 'n/a') + '\n\n';
    if (Array.isArray(data) && data.length > 0) {
      out.textContent += 'First item keys: ' + Object.keys(data[0]).join(', ') + '\n';
      out.textContent += 'Title: ' + data[0].title + '\n';
      out.textContent += 'Has automatedChecks: ' + !!data[0].automatedChecks + '\n';
      out.textContent += 'Has judgeResult: ' + !!data[0].judgeResult + '\n';
      out.textContent += 'Has fullText: ' + !!data[0].fullText + '\n';
      out.textContent += 'Has systemPrompt: ' + !!data[0].systemPrompt + '\n';
    }
    out.style.color = 'green';
  } catch(e) {
    out.textContent = 'PARSE ERROR: ' + e.message;
    out.style.color = 'red';
  }
}

function tryRender() {
  const out = document.getElementById('output');
  const text = document.getElementById('input').value.trim();
  try {
    const data = JSON.parse(text);
    const arr = Array.isArray(data) ? data : [data];

    let html = '<h3>Rendered ' + arr.length + ' stories</h3>';
    for (const r of arr) {
      html += '<div style="border:1px solid #ccc;padding:0.5rem;margin:0.5rem 0;border-radius:4px">';
      html += '<b>' + esc(r.title || 'no title') + '</b> (' + esc(r.structure || '?') + ')<br>';
      html += 'Score: ' + (r.automatedScore * 100).toFixed(0) + '%';
      if (r.judgeResult) html += ' | Judge: ' + r.judgeResult.averageScore.toFixed(1) + '/5';
      html += '<br>Pages: ' + (r.pageCount || 0);
      html += '</div>';
    }

    out.innerHTML = html;
    out.style.color = 'black';
  } catch(e) {
    out.textContent = 'RENDER ERROR: ' + e.message + '\n' + e.stack;
    out.style.color = 'red';
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
