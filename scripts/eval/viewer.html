<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storyverse Eval Results</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f3ef; color: #333; padding: 2rem; }
    h1 { font-size: 1.5rem; color: #1a1a1a; margin-bottom: 0.5rem; }
    h3 { font-size: 0.95rem; color: #333; margin-bottom: 0.5rem; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: white; border-radius: 12px; padding: 1.25rem; border: 1px solid #e5e2dc; }
    .stat .val { font-size: 1.8rem; font-weight: 700; color: #534AB7; }
    .stat .lbl { font-size: 0.75rem; color: #888; margin-top: 0.25rem; }
    .card { background: white; border-radius: 12px; border: 1px solid #e5e2dc; margin-bottom: 1rem; overflow: hidden; }
    .card-head { padding: 1rem; border-bottom: 1px solid #f0ede8; cursor: pointer; }
    .card-head:hover { background: #faf9f7; }
    .card-body { padding: 1rem; display: none; }
    .card-body.open { display: block; }
    .badge { background: #f0ede8; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.75rem; color: #888; margin-right: 0.5rem; }
    .chk { padding: 0.3rem 0.5rem; border-radius: 6px; font-size: 0.8rem; margin-bottom: 0.25rem; }
    .chk.pass { background: #ecfdf5; color: #065f46; }
    .chk.fail { background: #fef2f2; color: #991b1b; }
    .bar-bg { width: 120px; height: 14px; background: #f0ede8; border-radius: 3px; display: inline-block; vertical-align: middle; overflow: hidden; }
    .bar { height: 100%; border-radius: 3px; }
    .notes { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 0.75rem; font-size: 0.8rem; color: #92400e; margin-top: 0.75rem; }
    .pg { margin-bottom: 0.75rem; }
    .pg-num { font-size: 0.7rem; color: #999; font-weight: 600; }
    .pg-txt { font-size: 0.85rem; line-height: 1.6; color: #444; font-family: Georgia, serif; }
    pre.prompt { white-space: pre-wrap; font-size: 0.75rem; color: #555; background: #f9f8f6; padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem; max-height: 400px; overflow-y: auto; }
    textarea { width: 100%; min-height: 120px; border: 1px solid #ccc; border-radius: 8px; padding: 0.75rem; font-family: monospace; font-size: 0.8rem; }
    .btn { padding: 0.5rem 1.25rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; border: none; background: #534AB7; color: white; }
    .err { color: red; padding: 1rem; background: #fef2f2; border-radius: 8px; margin-top: 1rem; }
  </style>
</head>
<body>

<h1>Storyverse Prompt Eval</h1>
<p style="color:#888;font-size:0.85rem;margin-bottom:1.5rem">Paste eval JSON or choose a file</p>

<div style="display:flex;gap:1rem;margin-bottom:1rem;align-items:start">
  <div style="flex:1">
    <textarea id="jsonInput" placeholder="Paste eval results JSON here..."></textarea>
  </div>
  <div style="display:flex;flex-direction:column;gap:0.5rem">
    <button class="btn" onclick="loadIt()">Load JSON</button>
    <input type="file" id="fileInput" accept=".json" style="font-size:0.8rem">
  </div>
</div>

<div id="output"></div>

<script>
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function bc(score, max) {
  var p = score / max;
  if (p >= 0.9) return '#0ea5e9';
  if (p >= 0.7) return '#22c55e';
  if (p >= 0.5) return '#eab308';
  if (p >= 0.3) return '#f97316';
  return '#ef4444';
}

document.getElementById('fileInput').addEventListener('change', function(ev) {
  var f = ev.target.files[0];
  if (!f) return;
  var r = new FileReader();
  r.onload = function(fe) {
    document.getElementById('jsonInput').value = fe.target.result;
    loadIt();
  };
  r.readAsText(f);
});

function loadIt() {
  var out = document.getElementById('output');
  var text = document.getElementById('jsonInput').value.trim();
  if (!text) { out.innerHTML = ''; return; }

  var data;
  try { data = JSON.parse(text); }
  catch(err) { out.innerHTML = '<div class="err">Parse Error: ' + esc(err.message) + '</div>'; return; }

  var results = Array.isArray(data) ? data : [data];

  try {
    var h = '';
    var aSum = 0, jSum = 0, tSum = 0, jCnt = 0;
    for (var i = 0; i < results.length; i++) {
      aSum += (results[i].automatedScore || 0);
      tSum += (results[i].generationTimeMs || 0);
      if (results[i].judgeResult) { jSum += results[i].judgeResult.averageScore; jCnt++; }
    }

    h += '<div class="summary">';
    h += '<div class="stat"><div class="val">' + ((aSum / results.length) * 100).toFixed(0) + '%</div><div class="lbl">Automated Score</div></div>';
    if (jCnt > 0) h += '<div class="stat"><div class="val">' + (jSum / jCnt).toFixed(1) + '</div><div class="lbl">Judge Score /5</div></div>';
    h += '<div class="stat"><div class="val">' + ((tSum / results.length) / 1000).toFixed(1) + 's</div><div class="lbl">Avg Time</div></div>';
    h += '<div class="stat"><div class="val">' + results.length + '</div><div class="lbl">Stories</div></div>';
    h += '</div>';

    // Category averages
    if (jCnt > 0 && results[0].judgeResult) {
      var cats = [];
      for (var x = 0; x < results[0].judgeResult.scores.length; x++) cats.push(results[0].judgeResult.scores[x].category);
      h += '<div class="card"><div style="padding:1rem"><h3>Judge Category Averages</h3>';
      for (var ci = 0; ci < cats.length; ci++) {
        var csum = 0, ccnt = 0;
        for (var ri = 0; ri < results.length; ri++) {
          if (!results[ri].judgeResult) continue;
          for (var si = 0; si < results[ri].judgeResult.scores.length; si++) {
            if (results[ri].judgeResult.scores[si].category === cats[ci]) { csum += results[ri].judgeResult.scores[si].score; ccnt++; }
          }
        }
        var cavg = ccnt > 0 ? csum / ccnt : 0;
        h += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem;font-size:0.8rem">';
        h += '<div style="width:180px;text-align:right;color:#555">' + esc(cats[ci].replace(/_/g, ' ')) + '</div>';
        h += '<div class="bar-bg"><div class="bar" style="width:' + ((cavg/5)*100) + '%;background:' + bc(cavg,5) + '"></div></div>';
        h += '<div style="width:40px;font-weight:600">' + cavg.toFixed(1) + '/5</div></div>';
      }
      h += '</div></div>';
    }

    // Each story
    for (var si2 = 0; si2 < results.length; si2++) {
      var r = results[si2];
      var cid = 'c' + si2;
      h += '<div class="card">';
      h += '<div class="card-head" data-target="' + cid + '">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div><strong>' + esc(r.title) + '</strong><br>';
      h += '<span class="badge">' + esc(r.structure) + '</span>';
      h += '<span class="badge">' + esc(r.ageGroup) + '</span>';
      h += '<span class="badge">' + (r.pageCount||0) + ' pg</span>';
      h += '<span style="font-size:0.75rem;color:#888">' + ((r.generationTimeMs||0)/1000).toFixed(1) + 's</span></div>';
      h += '<div style="font-size:0.8rem;color:#888">Auto: ' + ((r.automatedScore||0)*100).toFixed(0) + '%';
      if (r.judgeResult) h += ' | Judge: ' + r.judgeResult.averageScore.toFixed(1) + '/5';
      h += '</div></div></div>';

      h += '<div class="card-body" id="' + cid + '">';

      // Checks
      if (r.automatedChecks) {
        h += '<h3>Automated Checks</h3>';
        for (var cci = 0; cci < r.automatedChecks.length; cci++) {
          var ck = r.automatedChecks[cci];
          h += '<div class="chk ' + (ck.passed ? 'pass' : 'fail') + '">';
          h += (ck.passed ? '&#10003; ' : '&#10007; ');
          h += '<strong>' + esc(ck.name) + '</strong>: ' + esc(ck.detail) + '</div>';
        }
      }

      // Judge
      if (r.judgeResult) {
        h += '<h3 style="margin-top:1rem">Judge (' + r.judgeResult.averageScore.toFixed(1) + '/5)</h3>';
        for (var ji = 0; ji < r.judgeResult.scores.length; ji++) {
          var sc = r.judgeResult.scores[ji];
          h += '<div style="margin-bottom:0.4rem;font-size:0.8rem">';
          h += '<div class="bar-bg"><div class="bar" style="width:' + ((sc.score/5)*100) + '%;background:' + bc(sc.score,5) + '"></div></div> ';
          h += '<strong>' + sc.score + '/5</strong> ' + esc(sc.category.replace(/_/g,' '));
          h += ': <span style="color:#888">' + esc(sc.reasoning) + '</span></div>';
        }
        if (r.judgeResult.overallNotes) h += '<div class="notes">' + esc(r.judgeResult.overallNotes) + '</div>';
      }

      // Prompts
      if (r.systemPrompt) {
        h += '<details style="margin-top:1rem"><summary style="cursor:pointer;font-size:0.8rem;color:#534AB7;font-weight:600">System Prompt (' + r.systemPrompt.length + ' chars)</summary>';
        h += '<pre class="prompt">' + esc(r.systemPrompt) + '</pre></details>';
      }
      if (r.userPrompt) {
        h += '<details><summary style="cursor:pointer;font-size:0.8rem;color:#534AB7;font-weight:600">User Prompt (' + r.userPrompt.length + ' chars)</summary>';
        h += '<pre class="prompt">' + esc(r.userPrompt) + '</pre></details>';
      }

      // Story text
      if (r.fullText) {
        h += '<h3 style="margin-top:1rem">Full Story</h3>';
        var pgs = r.fullText.split('\n\n');
        for (var pi = 0; pi < pgs.length; pi++) {
          h += '<div class="pg"><div class="pg-num">Page ' + (pi+1) + '</div>';
          h += '<div class="pg-txt">' + esc(pgs[pi]) + '</div></div>';
        }
      }

      h += '</div></div>';
    }

    out.innerHTML = h;

    // Wire toggles
    var heads = document.querySelectorAll('.card-head');
    for (var ti = 0; ti < heads.length; ti++) {
      heads[ti].addEventListener('click', function() {
        var target = document.getElementById(this.getAttribute('data-target'));
        if (target) target.className = target.className === 'card-body open' ? 'card-body' : 'card-body open';
      });
    }
  } catch(err) {
    out.innerHTML = '<div class="err"><strong>Render Error:</strong> ' + esc(err.message) + '<br><pre>' + esc(err.stack) + '</pre></div>';
  }
}
</script>
</body>
</html>
